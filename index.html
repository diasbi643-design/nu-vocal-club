<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NU Vocal Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: #0a0807;
    color: #f3ece2;
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::selection { background: #d4a14a; color: #0a0807; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(243, 236, 226, 0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(243, 236, 226, 0.22); }

  @keyframes tickerScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes tickerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes barPulse {
    from { height: 30%; }
    to { height: 100%; }
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .page-anim { animation: pageIn .5s cubic-bezier(.2,.7,.2,1); }

  .outer-shell {
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(243,236,226,0.04);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-events.jsx"></script>
<script type="text/babel" src="page-archive.jsx"></script>
<script type="text/babel" src="page-members-join.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

function App() {
  const tweakDefaults = TWEAK_DEFAULTS;
  const [tweaks, setTweak] = useTweaks(tweakDefaults);

  const theme = MOODS[tweaks.mood] || MOODS.dark;
  const density = DENSITY[tweaks.density] || DENSITY.regular;

  const [route, setRoute] = useState('home');
  const [playingId, setPlayingId] = useState(null);
  const stopRef = useRef(null);

  const target = useMemo(() => {
    // April 30, 2026, 21:30 local
    return new Date(2026, 3, 30, 21, 30, 0).getTime();
  }, []);

  const handlePlay = (event) => {
    if (stopRef.current) stopRef.current();
    const stop = playProgression(event.progression, {
      tempo: 110,
      type: event.style === 'piano' ? 'triangle' : event.style === 'sax' ? 'sawtooth' : 'square',
      gain: 0.06,
    });
    stopRef.current = stop;
    setPlayingId(event.id);
  };
  const handleStop = () => {
    if (stopRef.current) stopRef.current();
    stopRef.current = null;
    setPlayingId(null);
  };

  // stop audio on route change
  useEffect(() => { handleStop(); }, [route]);

  const goReserve = () => setRoute('events');

  return (
    <div style={{
      minHeight:'100vh',
      background: tweaks.mood === 'light' ? '#1a120a' : '#000',
      padding: '24px',
      display:'flex', justifyContent:'center', alignItems:'flex-start',
      position:'relative',
    }}>
      <div style={{ width:'100%', maxWidth: 1480, position:'relative' }}>
        <div className="outer-shell" style={{
          background: theme.pageBg,
          color: theme.text,
          border: `1px solid ${theme.border}`,
          borderRadius: 32,
          padding: 0,
          position:'relative',
          transition: 'background .4s, color .4s',
        }}>
          {/* TOP NAV */}
          <TopNav theme={theme} route={route} onRoute={setRoute}/>

          {/* PAGE */}
          <div className="page-anim" key={route + tweaks.heroVariant}>
            {route === 'home' && (
              <HomePage theme={theme} density={density} variant={tweaks.heroVariant}
                onRoute={setRoute} onPlay={handlePlay} onStop={handleStop} playingId={playingId}/>
            )}
            {route === 'events' && (
              <EventsPage theme={theme} density={density}
                onPlay={handlePlay} onStop={handleStop} playingId={playingId}/>
            )}
            {route === 'archive' && <ArchivePage theme={theme} density={density}/>}
            {route === 'members' && <MembersPage theme={theme} density={density}/>}
            {route === 'join' && <JoinPage theme={theme} density={density}/>}
          </div>

          {/* FOOTER */}
          <Footer theme={theme} density={density} onRoute={setRoute}/>
        </div>

        {/* Sticky ticker */}
        {tweaks.showTicker && (
          <div style={{
            position:'fixed', bottom:24, left:24, right:24, zIndex:20,
            pointerEvents:'none',
          }}>
            <div style={{ pointerEvents:'auto', maxWidth: 1432, margin:'0 auto' }}>
              <Ticker theme={theme} target={target}
                eventTitle="Jazz, After Dark"
                venue="Block 8 Lounge · Apr 30 · 21:30"
                onCta={goReserve}/>
            </div>
          </div>
        )}
      </div>

      {/* TWEAKS PANEL */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Color mood" subtitle="The lounge gets darker as the night goes on">
          <TweakRadio value={tweaks.mood} onChange={v=>setTweak('mood', v)}
            options={[
              { value:'dark', label:'Midnight'},
              { value:'sepia', label:'Lounge'},
              { value:'light', label:'Ivory'},
            ]}/>
        </TweakSection>
        <TweakSection title="Hero composition" subtitle="Three takes on the opening">
          <TweakRadio value={tweaks.heroVariant} onChange={v=>setTweak('heroVariant', v)}
            options={[
              { value:'bento', label:'Bento'},
              { value:'split', label:'Split'},
              { value:'poster', label:'Poster'},
            ]}/>
        </TweakSection>
        <TweakSection title="Density" subtitle="How much air around the type">
          <TweakRadio value={tweaks.density} onChange={v=>setTweak('density', v)}
            options={[
              { value:'cozy', label:'Cozy'},
              { value:'regular', label:'Regular'},
              { value:'airy', label:'Airy'},
            ]}/>
        </TweakSection>
        <TweakSection title="Concert ticker">
          <TweakToggle value={tweaks.showTicker} onChange={v=>setTweak('showTicker', v)} label="Show countdown ticker"/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

function Footer({ theme, density, onRoute }) {
  const D = density;
  return (
    <footer style={{
      marginTop: D.gap*1.5,
      padding: `${D.pad*1.4}px ${D.pad}px ${D.pad}px`,
      borderTop: `1px solid ${theme.border}`,
      display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap: D.gap*1.5,
    }}>
      <div>
        <Wordmark theme={theme} size={20}/>
        <p style={{
          margin:'18px 0 0', maxWidth: 360, color: theme.dim,
          fontFamily:'"Cormorant Garamond", serif', fontStyle:'italic', fontSize: 18, lineHeight:1.4,
        }}>
          "If the room remembers it, we did our job."
          <span style={{ display:'block', fontFamily:'"Space Grotesk", sans-serif', fontSize:11, letterSpacing:'.22em', textTransform:'uppercase', marginTop:10, fontStyle:'normal' }}>
            — house motto, Season I
          </span>
        </p>
      </div>
      {[
        { t:'Explore', items:[['Home','home'],['Upcoming events','events'],['Archive','archive'],['Members','members']]},
        { t:'Get involved', items:[['Audition','join'],['Volunteer','join'],['Press','events']]},
      ].map(col => (
        <div key={col.t}>
          <div style={{ fontFamily:'"Space Grotesk", sans-serif', fontSize:10, letterSpacing:'.22em', textTransform:'uppercase', color: theme.accent, marginBottom:14 }}>{col.t}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {col.items.map(([l, r]) => (
              <button key={l} onClick={()=>onRoute(r)} style={{
                appearance:'none', border:'none', background:'transparent', cursor:'pointer', textAlign:'left', padding:0,
                color: theme.text,
                fontFamily:'"Bebas Neue", sans-serif', fontSize:18, letterSpacing:'.04em',
              }}>{l}</button>
            ))}
          </div>
        </div>
      ))}
      <div>
        <div style={{ fontFamily:'"Space Grotesk", sans-serif', fontSize:10, letterSpacing:'.22em', textTransform:'uppercase', color: theme.accent, marginBottom:14 }}>Find us</div>
        <div style={{ display:'flex', flexDirection:'column', gap:8, color: theme.text, fontFamily:'"Bebas Neue", sans-serif', fontSize:18, letterSpacing:'.04em' }}>
          <span>@nu.vocal.club</span>
          <span>vocal@nu.edu.kz</span>
        </div>
        <div style={{ marginTop:18, color: theme.dim, fontFamily:'"Space Grotesk", sans-serif', fontSize:11, letterSpacing:'.18em', textTransform:'uppercase' }}>
          Nazarbayev University<br/>Astana, KZ
        </div>
      </div>
    </footer>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
